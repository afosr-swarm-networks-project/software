# Clock
- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS

# rx_vehicle joint states
- ros_topic_name: /rx_vehicle/joint_states
  gz_topic_name: /rx_vehicle/joint_states
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: gz.msgs.Model
  direction: GZ_TO_ROS

# No need to use odometry or tf topics since we can directly use the pose topic
# - ros_topic_name: /rx_vehicle/odometry
#   gz_topic_name: /rx_vehicle/odometry
